<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 400" role="img" aria-labelledby="title desc">
  <title id="title">Anteprima grafo iARGOS</title>
  <desc id="desc">Nodo centrale iARGOS con connessioni verso moduli operativi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1222"/>
      <stop offset="1" stop-color="#162845"/>
    </linearGradient>
    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#ffe5a0" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#ffe5a0" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <rect width="720" height="400" rx="26" fill="url(#bg)"/>
  <g stroke="#7fdcff" stroke-opacity="0.45" stroke-width="2.5" fill="none">
    <path d="M120 88 L356 200"/>
    <path d="M215 320 L356 200"/>
    <path d="M560 90 L356 200"/>
    <path d="M610 282 L356 200"/>
    <path d="M80 232 L356 200"/>
    <path d="M430 335 L356 200"/>
  </g>

  <g fill="#a4d8ff" fill-opacity="0.85">
    <circle cx="120" cy="88" r="18"/>
    <circle cx="215" cy="320" r="16"/>
    <circle cx="560" cy="90" r="17"/>
    <circle cx="610" cy="282" r="15"/>
    <circle cx="80" cy="232" r="14"/>
    <circle cx="430" cy="335" r="14"/>
  </g>

  <g transform="translate(356 200)">
    <circle r="84" fill="url(#coreGlow)" filter="url(#soft)"/>
    <circle r="43" fill="#ffe3a6" stroke="#fff1c7" stroke-width="2"/>
    <text y="6" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="700" fill="#0a1222">iARGOS</text>
  </g>

  <text x="24" y="372" font-family="Arial, sans-serif" font-size="18" fill="#c7d8f3" fill-opacity="0.92">
    Grafo operativo AI • clicca per avviare il video
  </text>
</svg>
