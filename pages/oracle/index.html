      root.style.setProperty('--fixed-header-offset', initialHeaderOffset + 'px');
      root.style.setProperty('--header-fade-height', (initialHeaderOffset + 1) + 'px');
    })();
  </script>

<style>
  .oracle-skip-btn {
    position: fixed;
    bottom: 2.4rem;

    text-transform: uppercase;

    animation: oracle-skip-in .6s .9s both;
  }

  @keyframes oracle-skip-in { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: none; } }
  .oracle-progress {

    bottom: 0; left: 0;
    height: 2px;
    width: 0%;

    z-index: 201;
    transition: width linear;
  }

  <script>
    (function(){
      var DURATION = 3000; // ms prima del redirect automatico
      var start = Date.now();
      var bar = document.getElementById('oracle-progress');
      // Anima la barra di progresso
      if(bar){
        bar.style.transition = 'width '+DURATION+'ms linear';
        requestAnimationFrame(function(){ bar.style.width = '100%'; });
      }
      // Redirect automatico
      var timer = setTimeout(function(){
        window.location.href = './cosmos/';
      }, DURATION);
      // Click su qualsiasi punto del wormhole → redirect immediato
      var link = document.querySelector('.oracle-wormhole__link');
      if(link){
        link.addEventListener('click', function(e){
          e.preventDefault();
          clearTimeout(timer);
          window.location.href = './cosmos/';
        });
      }
    })();
  </script>
