  <script>
    (function () {
      const toHref = (path) => {
        const p = String(path || '').trim();
        if (!p) return '#';
        if (/^https?:\/\//i.test(p) || p.startsWith('/')) return p;
        return `../../${p.replace(/^\.?\/*/, '')}`;
      };

      const escapeHtml = (value) => String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

      const getBallTone = (n) => {
        if (!Number.isFinite(n)) return '';
        if (n <= 15) return 'cc-ball-tone--azure';
        if (n <= 30) return 'cc-ball-tone--coral';
        if (n <= 45) return 'cc-ball-tone--gold';
        if (n <= 60) return 'cc-ball-tone--emerald';
        if (n <= 75) return 'cc-ball-tone--violet';
        return 'cc-ball-tone--rose';
      };

      const renderNextDrawBanner = async () => {
        const banner = document.getElementById('next-draw-proposals-banner');
        const label = document.getElementById('next-draw-proposals-label');
        if (!banner || !label) return;
        try {
          const res = await fetch('../../archives/draws/draws.csv', { cache: 'no-store' });
          if (!res.ok) return;
          const csv = await res.text();
          const lines = csv.split(/\r?\n/).map((l) => l.trim()).filter(Boolean);
          if (lines.length < 2) return;
          const last = lines[lines.length - 1].split(',').map((x) => x.trim());
          const seq = parseInt(last[0], 10);
          const m = String(last[1] || '').match(/^(\d{2})\/(\d{2})\/(\d{4})$/);
          if (!Number.isFinite(seq) || !m) return;

          const base = new Date(Number(m[3]), Number(m[2]) - 1, Number(m[1]));
          const drawDays = new Set([2, 4, 5, 6]); // mar, gio, ven, sab
          const next = new Date(base);
          for (let i = 0; i < 7; i += 1) {
            next.setDate(next.getDate() + 1);
            if (drawDays.has(next.getDay())) break;
          }
          const weekdays = ['Domenica', 'Lunedi', 'Martedi', 'Mercoledi', 'Giovedi', 'Venerdi', 'Sabato'];
          const dd = String(next.getDate()).padStart(2, '0');
          const mm = String(next.getMonth() + 1).padStart(2, '0');
          const yyyy = next.getFullYear();
          label.textContent = `#${seq + 1} - ${weekdays[next.getDay()]} ${dd}/${mm}/${yyyy} ore 20:00`;
          banner.style.display = '';
        } catch (_) {}
      };

      const loadManifestCards = async () => {
        if (window.CC_REPO && typeof window.CC_REPO.loadCardsByManifest === 'function') {
          return window.CC_REPO.loadCardsByManifest('../../data/modules-manifest.json');
        }
        const res = await fetch('../../data/modules-manifest.json', { cache: 'no-store' });
        if (!res.ok) return [];
        const manifest = await res.json();
        const entries = Array.isArray(manifest?.cards) ? manifest.cards : (Array.isArray(manifest) ? manifest : []);
        if (!entries.length) return [];
        if (entries.every((e) => typeof e === 'string')) {
          const rows = await Promise.all(entries.map(async (entry) => {
            try {
              const r = await fetch(toHref(entry), { cache: 'no-store' });
              if (!r.ok) return null;
              return await r.json();
            } catch (_) {
              return null;
            }
          }));
          return rows.filter(Boolean);
        }
        return entries.filter((e) => e && typeof e === 'object');
      };

      const render = async () => {
        const host = document.querySelector('[data-proposals-list]');
        if (!host) return;
        const cardsApi = window.CARDS;
        if (!cardsApi) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Motore card non disponibile.</div>';
          return;
        }

        const modules = await loadManifestCards();
        const activeAlgorithms = (Array.isArray(modules) ? modules : []).filter((card) => {
          if (!card || card.isActive === false) return false;
          const page = String(card.page || '').toLowerCase();
          return page.includes('/algoritmi/algs/');
        });

        if (!activeAlgorithms.length) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Nessun algoritmo attivo disponibile.</div>';
          return;
        }

        const latestArchiveSeq = (typeof cardsApi.getLatestArchiveSeq === 'function')
          ? await cardsApi.getLatestArchiveSeq()
          : null;

        const rows = await Promise.all(activeAlgorithms.map(async (card) => {
          let ranking = Number.isFinite(card?.rankingValue) ? Number(card.rankingValue) : Number.NaN;
          if (!Number.isFinite(ranking) && typeof cardsApi.computeRankingForAlgorithm === 'function') {
            ranking = await cardsApi.computeRankingForAlgorithm(card);
          }

          let proposal = [];
          if (typeof cardsApi.resolveMetricsUrl === 'function'
            && typeof cardsApi.readCsvRows === 'function'
            && typeof cardsApi.extractProposalInfo === 'function'
            && typeof cardsApi.normalizeProposalNumbers === 'function') {
            const metricsUrl = cardsApi.resolveMetricsUrl(card);
            const metricsRows = await cardsApi.readCsvRows(metricsUrl);
            const info = cardsApi.extractProposalInfo(metricsRows || []);
            const nextSeq = Number.isFinite(info?.nextSeq) ? info.nextSeq : null;
            const isUpdated = Number.isFinite(latestArchiveSeq) && Number.isFinite(nextSeq) && nextSeq > latestArchiveSeq;
            proposal = isUpdated || !Number.isFinite(latestArchiveSeq)
              ? cardsApi.normalizeProposalNumbers(info?.proposal)
              : [];
          }

          return { card, ranking, proposal };
        }));

        const rowsWithProposal = rows
          .filter((row) => Array.isArray(row.proposal) && row.proposal.length === 6)
          .sort((a, b) => {
            const ra = Number.isFinite(a.ranking) ? a.ranking : Number.NEGATIVE_INFINITY;
            const rb = Number.isFinite(b.ranking) ? b.ranking : Number.NEGATIVE_INFINITY;
            return rb - ra;
          });

        if (!rowsWithProposal.length) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Nessuna proposta disponibile al momento.</div>';
          return;
        }

        const rankingFmt = new Intl.NumberFormat('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        host.innerHTML = rowsWithProposal.map((row) => {
          const title = escapeHtml(row.card.title || row.card.id || 'Algoritmo');
          const href = escapeHtml(toHref(row.card.page || '#'));
          const rank = Number.isFinite(row.ranking) ? rankingFmt.format(row.ranking) : '--';
          const balls = row.proposal.map((value) => {
            const tone = getBallTone(parseInt(value, 10));
            return `<span class="cc-proposal-ball${tone ? ` ${tone}` : ''}">${escapeHtml(value)}</span>`;
          }).join('');
          return `
            <a href="${href}" class="cc-proposal-row" title="${title}">
              <span class="cc-proposal-alg cc-alg-link">${title}</span>
              <span class="cc-proposal-balls">${balls}</span>
              <span class="cc-proposal-rank">${escapeHtml(rank)}</span>
            </a>
          `;
        }).join('');
      };

      window.addEventListener('load', () => {
        window.setTimeout(() => {
          render().catch(() => {});
          renderNextDrawBanner().catch(() => {});
        }, 60);
      });
    })();
  </script>
