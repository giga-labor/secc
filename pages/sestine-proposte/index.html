  <script>
    (function () {
      const toHref = (path) => {
        const p = String(path || '').trim();
        if (!p) return '#';
        if (/^https?:\/\//i.test(p) || p.startsWith('/')) return p;
        return `../../${p.replace(/^\.?\/*/, '')}`;
      };

      const escapeHtml = (value) => String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');

      const getBallTone = (n) => {
        if (!Number.isFinite(n)) return '';
        if (n <= 15) return 'cc-ball-tone--azure';
        if (n <= 30) return 'cc-ball-tone--coral';
        if (n <= 45) return 'cc-ball-tone--gold';
        if (n <= 60) return 'cc-ball-tone--emerald';
        if (n <= 75) return 'cc-ball-tone--violet';
        return 'cc-ball-tone--rose';
      };

      const renderNextDrawBanner = async () => {
        const banner = document.getElementById('next-draw-proposals-banner');
        const label = document.getElementById('next-draw-proposals-label');
        if (!banner || !label) return;
        try {
          const res = await fetch('../../data/next-draw.json', { cache: 'no-store' });
          if (!res.ok) return;
          const d = await res.json();
          if (!d || !d.next_seq || !d.next_date || !d.next_weekday) return;
          label.textContent = `#${d.next_seq} - ${d.next_weekday} ${d.next_date} ore ${d.next_time || '20:00'}`;
          banner.style.display = '';
        } catch (_) {}
      };

      const normalizePathKey = (value) => String(value || '')
        .trim()
        .toLowerCase()
        .replace(/\\/g, '/')
        .replace(/^https?:\/\/[^/]+/i, '')
        .replace(/\/index\.html?$/i, '/')
        .replace(/\/+$/g, '/')
        .replace(/^\/+/, '');

      const rankingKeysForCard = (card) => {
        const keys = [];
        const id = String(card?.id || '').trim().toLowerCase();
        const page = normalizePathKey(card?.page || '');
        if (id) keys.push(`id:${id}`);
        if (page) keys.push(`page:${page}`);
        return keys;
      };

      const loadCardsIndexRankingMap = async () => {
        try {
          const res = await fetch('../../data/cards-index.json', { cache: 'no-store' });
          if (!res.ok) return new Map();
          const rows = await res.json();
          if (!Array.isArray(rows)) return new Map();
          const out = new Map();
          rows.forEach((row) => {
            const rankingValue = Number(row?.rankingValue);
            const rankingPosition = Number(row?.rankingPosition);
            if (!Number.isFinite(rankingValue) && !Number.isFinite(rankingPosition)) return;
            rankingKeysForCard(row).forEach((key) => {
              if (!out.has(key)) {
                out.set(key, {
                  rankingValue: Number.isFinite(rankingValue) ? rankingValue : Number.NaN,
                  rankingPosition: Number.isFinite(rankingPosition) ? rankingPosition : Number.POSITIVE_INFINITY,
                });
              }
            });
          });
          return out;
        } catch (_) {
          return new Map();
        }
      };

      const loadManifestCards = async () => {
        const repo = window.CC_DATA_REPOSITORY || window.CC_REPO;
        if (repo && typeof repo.loadCardsByManifest === 'function') {
          return repo.loadCardsByManifest('../../data/modules-manifest.json');
        }
        const res = await fetch('../../data/modules-manifest.json', { cache: 'no-store' });
        if (!res.ok) return [];
        const manifest = await res.json();
        const entries = Array.isArray(manifest?.cards) ? manifest.cards : (Array.isArray(manifest) ? manifest : []);
        if (!entries.length) return [];
        if (entries.every((e) => typeof e === 'string')) {
          const rows = await Promise.all(entries.map(async (entry) => {
            try {
              const r = await fetch(toHref(entry), { cache: 'no-store' });
              if (!r.ok) return null;
              return await r.json();
            } catch (_) {
              return null;
            }
          }));
          return rows.filter(Boolean);
        }
        return entries.filter((e) => e && typeof e === 'object');
      };

      const render = async () => {
        const host = document.querySelector('[data-proposals-list]');
        if (!host) return;
        const cardsApi = window.CARDS;
        if (!cardsApi) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Motore card non disponibile.</div>';
          return;
        }

        const modules = await loadManifestCards();
        const activeAlgorithms = (Array.isArray(modules) ? modules : []).filter((card) => {
          if (!card || card.isActive === false) return false;
          const page = String(card.page || '').toLowerCase();
          return page.includes('/algoritmi/algs/');
        });

        if (!activeAlgorithms.length) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Nessun algoritmo attivo disponibile.</div>';
          return;
        }

        const latestArchiveSeq = (typeof cardsApi.getLatestArchiveSeq === 'function')
          ? await cardsApi.getLatestArchiveSeq()
          : null;
        const rankingMap = await loadCardsIndexRankingMap();

        const rows = await Promise.all(activeAlgorithms.map(async (card) => {
          let ranking = Number.NaN;
          let rankingPosition = Number.POSITIVE_INFINITY;
          const enriched = rankingKeysForCard(card).reduce((acc, key) => acc || rankingMap.get(key), null);
          const rawRanking = (enriched && Number.isFinite(enriched.rankingValue))
            ? enriched.rankingValue
            : Number(card?.rankingValue);
          const rawPosition = (enriched && Number.isFinite(enriched.rankingPosition))
            ? enriched.rankingPosition
            : Number(card?.rankingPosition);
          if (Number.isFinite(rawRanking)) ranking = rawRanking;
          if (Number.isFinite(rawPosition)) rankingPosition = rawPosition;

          let proposal = [];
          if (typeof cardsApi.resolveMetricsUrl === 'function'
            && typeof cardsApi.readCsvRows === 'function'
            && typeof cardsApi.extractProposalInfo === 'function'
            && typeof cardsApi.normalizeProposalNumbers === 'function') {
            const metricsUrl = cardsApi.resolveMetricsUrl(card);
            const metricsRows = await cardsApi.readCsvRows(metricsUrl);
            const info = cardsApi.extractProposalInfo(metricsRows || []);
            const nextSeq = Number.isFinite(info?.nextSeq) ? info.nextSeq : null;
            const isUpdated = Number.isFinite(latestArchiveSeq) && Number.isFinite(nextSeq) && nextSeq > latestArchiveSeq;
            proposal = isUpdated || !Number.isFinite(latestArchiveSeq)
              ? cardsApi.normalizeProposalNumbers(info?.proposal)
              : [];
          }

          return { card, ranking, rankingPosition, proposal };
        }));

        const rowsWithProposal = rows
          .filter((row) => Array.isArray(row.proposal) && row.proposal.length === 6)
          .sort((a, b) => {
            const ra = Number.isFinite(a.ranking) ? a.ranking : Number.NEGATIVE_INFINITY;
            const rb = Number.isFinite(b.ranking) ? b.ranking : Number.NEGATIVE_INFINITY;
            if (rb !== ra) return rb - ra;
            const pa = Number.isFinite(a.rankingPosition) ? a.rankingPosition : Number.POSITIVE_INFINITY;
            const pb = Number.isFinite(b.rankingPosition) ? b.rankingPosition : Number.POSITIVE_INFINITY;
            if (pa !== pb) return pa - pb;
            const ta = String(a.card?.title || a.card?.id || '').toLowerCase();
            const tb = String(b.card?.title || b.card?.id || '').toLowerCase();
            return ta.localeCompare(tb);
          });

        if (!rowsWithProposal.length) {
          host.innerHTML = '<div class="rounded-xl border border-white/10 bg-midnight/50 px-3 py-3 text-xs text-ash text-center">Nessuna proposta disponibile al momento.</div>';
          return;
        }

        const rankingFmt = new Intl.NumberFormat('it-IT', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

        const resolveMacroKey = (raw) => {
          const k = String(raw || '').trim().toLowerCase();
          if (k.includes('neur')) return 'neurali';
          if (k.includes('ibrid') || k.includes('hybrid') || k.includes('custom')) return 'ibridi';
          return 'statistici';
        };
        const MACRO_BADGE = {
          statistici: 'border-[#8fceec]/60 text-[#8fceec]',
          neurali:    'border-[#b7a2f4]/60 text-[#b7a2f4]',
          ibridi:     'border-[#7ecba5]/60 text-[#7ecba5]'
        };

        host.innerHTML = rowsWithProposal.map((row, idx) => {
          const title  = escapeHtml(row.card.title || row.card.id || 'Algoritmo');
          const href   = escapeHtml(toHref(row.card.page || '#'));
          const rank   = Number.isFinite(row.ranking) ? rankingFmt.format(row.ranking) : '--';
          const mKey   = resolveMacroKey(row.card.macroGroup);
          const mCls   = MACRO_BADGE[mKey] || 'border-white/20 text-ash';
          const rankPos = Number.isFinite(row.rankingPosition) ? `#${row.rankingPosition}` : `#${idx + 1}`;
          const balls  = row.proposal.map((value) => {
            const tone = getBallTone(parseInt(value, 10));
            return `<span class="cc-proposal-ball${tone ? ` ${tone}` : ''}">${escapeHtml(value)}</span>`;
          }).join('');
          return `
            <a href="${href}" class="cc-proposal-row" title="${title}" data-proposal-group="${mKey}">
              <span class="cc-proposal-alg-wrap" style="display:flex;flex-direction:column;gap:.2rem">
                <span class="cc-proposal-alg cc-alg-link">${title}</span>
                <span style="display:flex;gap:.3rem;align-items:center">
                  <span class="rounded-full border ${mCls} px-1.5 py-0 text-[.62rem] uppercase tracking-[.12em]">${mKey}</span>
                  <span style="font-size:.65rem;color:rgba(197,216,255,.4)">${rankPos}</span>
                </span>
              </span>
              <span class="cc-proposal-balls">${balls}</span>
              <span class="cc-proposal-rank">${escapeHtml(rank)}</span>
            </a>
          `;
        }).join('');

        // Attiva logica filtro pills
        initFilterPills();
      };

      const initFilterPills = () => {
        document.querySelectorAll('[data-filter-group]').forEach(btn => {
          btn.addEventListener('click', () => {
            document.querySelectorAll('[data-filter-group]').forEach(b => b.classList.remove('cc-prop-pill--active'));
            btn.classList.add('cc-prop-pill--active');
            const group = btn.dataset.filterGroup;
            document.querySelectorAll('[data-proposal-group]').forEach(row => {
              row.style.display = (group === 'tutti' || row.dataset.proposalGroup === group) ? '' : 'none';
            });
          });
        });
      };

      window.addEventListener('load', () => {
        window.setTimeout(() => {
          render().catch(() => {});
          renderNextDrawBanner().catch(() => {});
        }, 60);
      });
    })();
  </script>
